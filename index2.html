<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luis — Vision AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #07050f;
      color: #f0eeff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 700px 500px at 10% 0%, rgba(109,40,217,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 500px 400px at 90% 100%, rgba(5,150,105,0.14) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* CARD BASE */
    .card-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(12px);
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 700;
      color: #f0eeff;
      line-height: 1.2;
    }

    .header-info p {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    .live-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all .3s;
    }

    .live-dot.on {
      color: #34d399;
      background: rgba(52,211,153,0.1);
      border-color: rgba(52,211,153,0.2);
    }

    .live-dot span.dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .live-dot.on span.dot {
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* WEBCAM */
    .webcam-panel {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .webcam-panel canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }

    .webcam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.2);
    }

    .webcam-placeholder i {
      font-size: 40px;
    }

    .webcam-placeholder p {
      font-size: 13px;
    }

    /* Corner decorations */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: rgba(124,58,237,0.6);
      border-style: solid;
    }
    .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
    .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

    /* BUTTON */
    .btn-start {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform .15s, opacity .15s, box-shadow .15s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.35);
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(124,58,237,0.5);
    }

    .btn-start:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-start:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* PREDICTIONS */
    .predictions-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .predictions-header span {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3);
    }

    .pred-empty {
      text-align: center;
      padding: 20px 0 8px;
      color: rgba(255,255,255,0.2);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .pred-empty i { font-size: 24px; }

    .pred-row {
      margin-bottom: 14px;
    }

    .pred-row:last-child {
      margin-bottom: 0;
    }

    .pred-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .pred-name {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .pred-pct {
      font-size: 13px;
      font-weight: 700;
      color: #a78bfa;
      min-width: 36px;
      text-align: right;
    }

    .pred-pct.high { color: #34d399; }
    .pred-pct.mid  { color: #fbbf24; }

    .pred-track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
    }

    .pred-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      transition: width .22s ease;
      width: 0%;
    }

    .pred-fill.high { background: linear-gradient(90deg, #059669, #34d399); }
    .pred-fill.mid  { background: linear-gradient(90deg, #d97706, #fbbf24); }

    /* TOP CLASS BADGE */
    .top-badge {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .top-badge.visible { display: flex; }

    .top-badge i { color: #34d399; font-size: 14px; }

    .top-badge-text {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .top-badge-name {
      font-weight: 700;
      color: #34d399;
    }

    @media (max-width: 480px) {
      body { padding: 16px 12px; }
      .card-panel { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="avatar">L</div>
    <div class="header-info">
      <h1>Luis</h1>
      <p>Teachable Machine · Classificador de Imagem</p>
    </div>
    <div class="live-dot" id="live-badge">
      <span class="dot"></span>
      <span id="live-text">Offline</span>
    </div>
  </div>

  <!-- Webcam -->
  <div class="webcam-panel" id="webcam-panel">
    <div class="webcam-placeholder" id="webcam-placeholder">
      <i class="bi bi-camera-video-off"></i>
      <p>Câmera não iniciada</p>
    </div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
  </div>

  <!-- Start button -->
  <div class="card-panel" style="padding: 16px;">
    <button class="btn-start" id="btn-start" onclick="init()">
      <i class="bi bi-camera-video-fill" id="btn-icon"></i>
      <span id="btn-label">Ativar câmera e iniciar</span>
    </button>
  </div>

  <!-- Predictions -->
  <div class="card-panel">
    <div class="predictions-header">
      <span>Correspondência por classe</span>
      <span id="pred-count"></span>
    </div>

    <div class="top-badge" id="top-badge">
      <i class="bi bi-stars"></i>
      <span class="top-badge-text">Detectado: <span class="top-badge-name" id="top-name">—</span></span>
    </div>

    <div id="label-container">
      <div class="pred-empty">
        <i class="bi bi-bar-chart-line"></i>
        <span>Inicie a câmera para ver as previsões</span>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
  const MODEL_URL = "./my_model/";
  let model, webcam, maxPredictions;
  let bars = [];

  async function init() {
    const btn       = document.getElementById("btn-start");
    const btnIcon   = document.getElementById("btn-icon");
    const btnLabel  = document.getElementById("btn-label");

    btn.disabled = true;
    btnIcon.className = "bi bi-arrow-repeat spin";
    btnLabel.textContent = "Carregando modelo…";

    const style = document.createElement("style");
    style.textContent = "@keyframes spin{to{transform:rotate(360deg)}}.spin{display:inline-block;animation:spin .7s linear infinite;}";
    document.head.appendChild(style);

    try {
      model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
      maxPredictions = model.getTotalClasses();

      btnLabel.textContent = "Conectando câmera…";

      const flip = true;
      webcam = new tmImage.Webcam(500, 500, flip);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      const panel = document.getElementById("webcam-panel");
      document.getElementById("webcam-placeholder").remove();
      panel.insertBefore(webcam.canvas, panel.firstChild);

      buildBars();

      document.getElementById("live-badge").classList.add("on");
      document.getElementById("live-text").textContent = "Ao vivo";
      document.getElementById("top-badge").classList.add("visible");
      document.getElementById("pred-count").textContent = maxPredictions + " classes";

      btnIcon.className = "bi bi-check-circle-fill";
      btnIcon.style.animation = "none";
      btnLabel.textContent = "Câmera ativa";
      btn.style.background = "rgba(52,211,153,0.15)";
      btn.style.boxShadow  = "none";
      btn.style.border     = "1px solid rgba(52,211,153,0.25)";
      btn.style.color      = "#34d399";
      btn.disabled         = true;

    } catch (err) {
      console.error(err);
      btnIcon.className    = "bi bi-exclamation-triangle-fill";
      btnIcon.style.animation = "none";
      btnLabel.textContent = "Erro — clique para tentar novamente";
      btn.style.background = "linear-gradient(135deg,#991b1b,#ef4444)";
      btn.style.boxShadow  = "0 4px 24px rgba(239,68,68,0.35)";
      btn.disabled         = false;
    }
  }

  function buildBars() {
    const container = document.getElementById("label-container");
    container.innerHTML = "";
    bars = [];

    for (let i = 0; i < maxPredictions; i++) {
      const row = document.createElement("div");
      row.className = "pred-row";
      row.innerHTML = `
        <div class="pred-meta">
          <span class="pred-name" id="pn-${i}">Classe ${i+1}</span>
          <span class="pred-pct" id="pp-${i}">0%</span>
        </div>
        <div class="pred-track">
          <div class="pred-fill" id="pb-${i}"></div>
        </div>`;
      container.appendChild(row);
      bars.push({
        name: document.getElementById(`pn-${i}`),
        pct:  document.getElementById(`pp-${i}`),
        fill: document.getElementById(`pb-${i}`)
      });
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);

    let topIdx = 0, topVal = 0;
    prediction.forEach((p, i) => { if (p.probability > topVal) { topVal = p.probability; topIdx = i; } });

    document.getElementById("top-name").textContent = prediction[topIdx].className;

    for (let i = 0; i < maxPredictions; i++) {
      const pct = Math.round(prediction[i].probability * 100);
      const b   = bars[i];
      b.name.textContent  = prediction[i].className;
      b.pct.textContent   = pct + "%";
      b.fill.style.width  = pct + "%";

      const tier = pct >= 70 ? "high" : pct >= 40 ? "mid" : "";
      b.fill.className = "pred-fill" + (tier ? " " + tier : "");
      b.pct.className  = "pred-pct"  + (tier ? " " + tier : "");
    }
  }
</script>
</body>
</html>
