<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classificador — Luis</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
      color: #fff;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
    }

    .brand-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }

    .brand-sub {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.45);
      margin: 0;
    }

    /* Webcam container */
    #webcam-container {
      display: flex;
      justify-content: center;
    }

    #webcam-container canvas {
      border-radius: 16px;
      border: 2px solid rgba(167, 139, 250, 0.4);
      width: 100% !important;
      max-width: 320px;
      height: auto !important;
      box-shadow: 0 0 32px rgba(99, 102, 241, 0.25);
    }

    /* Start button */
    .btn-camera {
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      border: none;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.45);
    }

    .btn-camera:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(99, 102, 241, 0.6);
      color: #fff;
    }

    .btn-camera:active:not(:disabled) {
      transform: scale(0.97);
    }

    .btn-camera:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-camera .spinner-border {
      width: 1rem;
      height: 1rem;
      border-width: 2px;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 50px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }

    .status-badge.active {
      background: rgba(52, 211, 153, 0.15);
      color: #6ee7b7;
      border-color: rgba(52, 211, 153, 0.3);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-badge.active .status-dot {
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Divider */
    .divider {
      border-color: rgba(255,255,255,0.1);
    }

    /* Label / progress rows */
    .label-row {
      margin-bottom: 0.85rem;
    }

    .label-row:last-child {
      margin-bottom: 0;
    }

    .label-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .label-pct {
      font-size: 0.82rem;
      font-weight: 700;
      color: #a78bfa;
      min-width: 40px;
      text-align: right;
    }

    .progress {
      height: 8px;
      border-radius: 50px;
      background: rgba(255,255,255,0.08);
    }

    .progress-bar {
      border-radius: 50px;
      transition: width 0.2s ease;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
    }

    .progress-bar.high {
      background: linear-gradient(90deg, #10b981, #34d399);
    }

    .progress-bar.mid {
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
    }

    /* Placeholder state */
    #placeholder-msg {
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
      text-align: center;
    }

    @media (max-width: 480px) {
      .glass-card {
        margin: 1rem;
        padding: 1.5rem 1.25rem;
      }
    }
  </style>
</head>
<body>

<div class="glass-card">

  <!-- Header -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <div class="avatar">L</div>
    <div>
      <p class="brand-title">Luis</p>
      <p class="brand-sub">Teachable Machine · Image Classifier</p>
    </div>
    <div class="ms-auto">
      <span class="status-badge" id="status-badge">
        <span class="status-dot"></span>
        <span id="status-text">Offline</span>
      </span>
    </div>
  </div>

  <!-- Webcam -->
  <div id="webcam-container" class="mb-3">
    <div class="d-flex align-items-center justify-content-center"
         style="width:100%;max-width:320px;height:220px;border-radius:16px;
                background:rgba(255,255,255,0.04);border:2px dashed rgba(255,255,255,0.1);
                color:rgba(255,255,255,0.2);font-size:0.85rem;flex-direction:column;gap:8px;margin:auto;">
      <i class="bi bi-camera-video" style="font-size:2rem;"></i>
      <span>Câmera não iniciada</span>
    </div>
  </div>

  <!-- Start button -->
  <div class="d-flex justify-content-center mb-4">
    <button class="btn-camera" id="start-btn" onclick="init()">
      <i class="bi bi-camera-video-fill" id="btn-icon"></i>
      <span id="btn-text">Permitir câmera e iniciar</span>
    </button>
  </div>

  <hr class="divider my-3" />

  <!-- Predictions -->
  <div class="mb-2 d-flex align-items-center justify-content-between">
    <span style="font-size:0.7rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.35);font-weight:600;">
      Correspondência por classe
    </span>
  </div>

  <div id="label-container">
    <p id="placeholder-msg">
      <i class="bi bi-bar-chart-line me-1"></i>
      Inicie a câmera para ver as previsões
    </p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
  const MODEL_URL = "./my_model/";
  let model, webcam, maxPredictions;
  let predictionBars = [];

  async function init() {
    const btn = document.getElementById("start-btn");
    const btnIcon = document.getElementById("btn-icon");
    const btnText = document.getElementById("btn-text");

    btn.disabled = true;
    btnIcon.className = "";
    btnIcon.innerHTML = '<span class="spinner-border" role="status"></span>';
    btnText.textContent = "Carregando modelo…";

    try {
      model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
      maxPredictions = model.getTotalClasses();

      const flip = true;
      webcam = new tmImage.Webcam(320, 320, flip);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      // Replace placeholder with canvas
      const container = document.getElementById("webcam-container");
      container.innerHTML = "";
      container.appendChild(webcam.canvas);

      // Build progress bars
      buildLabels();

      // Update status
      const badge = document.getElementById("status-badge");
      badge.classList.add("active");
      document.getElementById("status-text").textContent = "Ao vivo";

      // Update button
      btnIcon.innerHTML = "";
      btnIcon.className = "bi bi-stop-circle-fill";
      btnText.textContent = "Câmera ativa";
      btn.style.background = "rgba(255,255,255,0.08)";
      btn.style.boxShadow = "none";
      btn.disabled = true;

    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btnIcon.innerHTML = "";
      btnIcon.className = "bi bi-exclamation-triangle-fill";
      btnText.textContent = "Erro — tentar novamente";
      btn.style.background = "linear-gradient(135deg,#ef4444,#f87171)";
    }
  }

  function buildLabels() {
    const container = document.getElementById("label-container");
    container.innerHTML = "";
    predictionBars = [];

    for (let i = 0; i < maxPredictions; i++) {
      const row = document.createElement("div");
      row.className = "label-row";
      row.innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-1">
          <span class="label-name" id="lbl-name-${i}">Classe ${i + 1}</span>
          <span class="label-pct" id="lbl-pct-${i}">0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="lbl-bar-${i}" role="progressbar"
               style="width:0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        </div>`;
      container.appendChild(row);
      predictionBars.push({
        name: document.getElementById(`lbl-name-${i}`),
        pct:  document.getElementById(`lbl-pct-${i}`),
        bar:  document.getElementById(`lbl-bar-${i}`),
      });
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);
    for (let i = 0; i < maxPredictions; i++) {
      const prob = prediction[i].probability;
      const pct  = Math.round(prob * 100);
      const el   = predictionBars[i];

      el.name.textContent = prediction[i].className;
      el.pct.textContent  = pct + "%";
      el.bar.style.width  = pct + "%";
      el.bar.setAttribute("aria-valuenow", pct);

      el.bar.classList.remove("high", "mid");
      if (pct >= 70)      el.bar.classList.add("high");
      else if (pct >= 40) el.bar.classList.add("mid");
    }
  }
</script>
</body>
</html>
